name: epg Test

on:
  workflow_dispatch:

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
           node-version: 18

    - name: npm grab epg
      run: |
          npm install
          #npm test --- telecomtv.uz
          npm run channels:parse --- --config=./sites/telecomtv.uz/telecomtv.uz.config.js --output=./sites/telecomtv.uz/telecomtv.uz.channels.xml
          #npm run grab --- --site=telecomtv.uz --maxConnections=20 --output=guides/telecomtv.uz.xml --days=1 --timeout=90000
   
    - name: Commit changes
      run: |
        git config --local user.email "your-email@example.com"
        git config --local user.name "Your Name"
        #git add -f guides/telecomtv.uz.xml
        git add -f sites/telecomtv.uz/telecomtv.uz.channels.xml
        git commit -m "Update xml"
        git push
