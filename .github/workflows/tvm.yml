name: tvm action

on:
  schedule:
    - cron: '05 */4 * * *'
  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    
      - uses: actions/checkout@v2

      - name: config
        run: |
          git config --global user.email "<>"
          git config --global user.name "tvm bot"
      
      - name: updating tvm
        run: 
            python3 ${GITHUB_WORKSPACE}/core/platforms/tvm.py > ${GITHUB_WORKSPACE}/streams/tvm.m3u8
            python3 ${GITHUB_WORKSPACE}/core/platforms/tvmnews.py > ${GITHUB_WORKSPACE}/streams/tvmnews.m3u8
            python3 ${GITHUB_WORKSPACE}/core/platforms/tvmsport.py > ${GITHUB_WORKSPACE}/streams/tvmsport.m3u8
            
      - name: git add
        run: |
          git add -A
          ls -la  
          git commit -m "initial commit"
          git push origin main
          
      - name: commit & push
        run: |
          git commit -m "tvm updated"
          git push -f origin master
