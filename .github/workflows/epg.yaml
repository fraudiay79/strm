name: update epg
on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
    - name: checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
           node-version: 20

    - name: npm grab epg
      env:
        NODE_OPTIONS: --max-old-space-size=7168 --expose-gc
      run: |
          npm install
          npm install oauth-1.0a
          npm run grab -- --channels=./epg/channels/channels.xml --gzip --output=./epg/epg-channels.xml --days=2 --maxConnections=10 --timeout=60000
          
    - name: Commit changes
      run: |
          git config user.name "🧟 Brainz"
          git config user.email "<>"
          git add -f epg/epg-channels.xml.gz
          git commit -m "updated epg"
          git push -f origin main
