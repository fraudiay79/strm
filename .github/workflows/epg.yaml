name: update epg
on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
    - name: checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: 20

    - name: Cache Node.js dependencies
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-
          ${{ runner.os }}-

    - name: npm grab epg
      env:
        NODE_OPTIONS: --max-old-space-size=7168 --expose-gc
      run: |
          npm ci
          npm install oauth-1.0a
          npm run grab -- --channels=./epg/channels/channels.xml --gzip --output=./epg/epg-channels.xml.gz --days=2 --maxConnections=20 --timeout=60000
          
    - name: Commit changes
      run: |
          git config user.name "🧟 Brainz"
          git config user.email "brainz@users.noreply.github.com"
          git add -f epg/epg-channels.xml.gz
          git status
          if git diff --staged --quiet; then
            echo "No EPG changes to commit"
            exit 0
          else
            git commit -m "update epg $(date +'%Y-%m-%d')"
            git push origin main
          fi
